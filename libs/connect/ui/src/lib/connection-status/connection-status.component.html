@if (status() === 'disconnected') {
  <div class="flex flex-col justify-center items-center gap-4">
    @if (message()) {
      <h2 class="text-center">{{ message() }}</h2>
    }
    @if (imageSrc()) {
      <img
        [src]="imageSrc()"
        [alt]="imageAlt()"
        class="max-w-full h-auto"
      />
    }
  </div>
} @else {
  <p>Connection status: {{ status() }}</p>
}
