<header>
  <div class="flex justify-between items-center px-4">
    <div class="flex items-center" routerLink="/">
      <img
        src="CHIRIMEN-banner.png"
        alt="Web Serial Console"
        class="w-64 h-[67px] my-4 mr-4"
      />
    </div>
    <div class="flex items-center gap-2">
      @for (action of toolbarActions; track action.name) {
        <button
          mat-icon-button
          [attr.aria-label]="action.name"
          type="button"
          (click)="toolbarAction.emit(action.name)"
        >
          <mat-icon [svgIcon]="action.icon"></mat-icon>
        </button>
      }
      <button mat-icon-button (click)="toggleRightSidebar.emit()">
        <mat-icon>
          @if (rightNavOpen()) {
            right_panel_close
          } @else {
            right_panel_open
          }
        </mat-icon>
      </button>
      <mat-icon [matMenuTriggerFor]="menu">menu</mat-icon>
      <mat-menu #menu="matMenu">
        @if (connected$() | async; as connected) {
          <button mat-menu-item (click)="eventDisConnect.emit()">
            <mat-icon>sync_disabled</mat-icon>
            <span>Web Serial DisConnect</span>
          </button>
        } @else {
          <button mat-menu-item (click)="eventConnect.emit()">
            <mat-icon>sync</mat-icon>
            <span>Web Serial Connect</span>
          </button>
        }
      </mat-menu>
    </div>
  </div>
</header>
