<header>
  <div
    class="flex items-center justify-between gap-4 border-b border-gray-200 px-4 py-4"
  >
    <div class="shrink-0 cursor-pointer" routerLink="/">
      <img
        src="CHIRIMEN-banner.png"
        alt="Web Serial Console"
        class="block h-[67px] w-64"
      />
    </div>
    <div class="flex shrink-0 items-center">
      <mat-icon [matMenuTriggerFor]="menu">menu</mat-icon>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="eventDisConnect.emit()">
          <mat-icon>sync_disabled</mat-icon>
          <span>Web Serial DisConnect</span>
        </button>
      </mat-menu>
    </div>
  </div>
</header>
