<div
  class="left-sidebar flex min-h-0 min-w-0 flex-1 flex-row overflow-hidden border-r border-gray-200"
>
  @if (leftNavOpen()) {
    <div class="flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
      <lib-file-tree-feature (fileSelected)="onFileSelected($event)" />
    </div>
  }
  <div
    class="flex shrink-0 flex-col items-center gap-1 border-l border-gray-200 py-2"
  >
    <mat-icon aria-hidden="true">folder</mat-icon>
    <button
      mat-icon-button
      type="button"
      [attr.aria-label]="
        leftNavOpen() ? 'Close left panel' : 'Open left panel'
      "
      (click)="toggleLeftSidebar.emit()"
    >
      <mat-icon>
        @if (leftNavOpen()) {
          left_panel_close
        } @else {
          left_panel_open
        }
      </mat-icon>
    </button>
  </div>
</div>
