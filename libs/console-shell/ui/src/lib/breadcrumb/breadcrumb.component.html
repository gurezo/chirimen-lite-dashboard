@if (segments().length > 0) {
  <nav aria-label="breadcrumb" class="px-4 py-2 text-sm text-gray-500">
    <ol
      class="m-0 flex list-none flex-wrap items-center gap-x-1 gap-y-0.5 p-0"
    >
      @for (segment of segments(); track $index) {
        <li class="flex items-center gap-1">
          @if (!$first) {
            <span aria-hidden="true" class="select-none text-gray-400">/</span>
          }
          @if ($last) {
            <span aria-current="page" class="font-medium text-gray-800">
              {{ segment.label }}
            </span>
          } @else {
            <span>{{ segment.label }}</span>
          }
        </li>
      }
    </ol>
  </nav>
}
