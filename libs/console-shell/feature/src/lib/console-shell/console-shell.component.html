<div class="flex h-[100dvh] min-h-0 flex-col overflow-hidden">
  <lib-header-toolbar
    class="shrink-0"
    [connected$]="connected$"
    [rightNavOpen]="rightNavOpen()"
    (eventConnect)="onConnect()"
    (eventDisConnect)="onDisConnect()"
    (toolbarAction)="onToolbarAction($event)"
    (toggleRightSidebar)="onToggleRightSidebar()"
  />
  <div class="flex min-h-0 flex-1 flex-col overflow-hidden">
    @if (connected$ | async; as connected) {
      <div
        class="grid h-full min-h-0 grid-rows-[auto_minmax(0,1fr)] gap-x-0 gap-y-2"
        [style.grid-template-columns]="gridTemplateColumns()"
      >
        <div class="col-span-3 min-h-0 shrink-0">
          <lib-breadcrumb [segments]="breadcrumbSegments()" />
        </div>
        <div class="flex min-h-0 min-w-0 flex-col overflow-hidden">
          <lib-left-sidebar />
        </div>

        <div class="min-h-0 min-w-0 overflow-hidden">
          @switch (activePanel()) {
            @case ('terminal') {
              <choh-terminal />
            }
            @case ('editor') {
              <choh-editor-page />
            }
            @case ('example') {
              <choh-example />
            }
          }
        </div>

        <div
          class="flex min-h-0 min-w-0 flex-col overflow-hidden"
          [class.border-l]="rightNavOpen()"
          [class.border-gray-200]="rightNavOpen()"
        >
          @if (rightNavOpen()) {
            <lib-right-sidebar class="min-h-0 min-w-0 flex-1" />
          }
        </div>
      </div>
    } @else {
      <lib-connect-page />
    }
  </div>
</div>
