<lib-header-toolbar
  [connected$]="connected$"
  [rightNavOpen]="rightNavOpen()"
  (eventConnect)="onConnect()"
  (eventDisConnect)="onDisConnect()"
  (toggleRightSidebar)="onToggleRightSidebar()"
/>
@if (connected$ | async; as connected) {
  <div class="grid grid-cols-[auto_1fr_auto] grid-rows-[auto_1fr] gap-2 h-screen">
    @if (leftNavOpen()) {
      <div class="min-h-0 overflow-auto">
        <lib-left-sidebar />
      </div>
    }

    <div class="min-h-0 overflow-auto">
      @switch (activePanel()) {
        @case ('terminal') {
          <choh-terminal />
        }
        @case ('editor') {
          <choh-editor-page />
        }
        @case ('example') {
          <choh-example />
        }
      }
    </div>

    @if (rightNavOpen()) {
      <div class="min-h-0 overflow-auto">
        <lib-right-sidebar />
      </div>
    }
  </div>
} @else {
  <div
    class="col-span-4 text-center h-[80vh] flex flex-col justify-center items-center gap-4"
  >
    <lib-connection-status
      status="disconnected"
      message="Raspberry Pi Zero と PC を USB で繋いだ後、Connect ボタンをクリックして、Web Serail を接続して下さい"
      imageSrc="/PiZeroW_OTG.jpg"
      imageAlt="PiZeroW_OTG"
    />
    <lib-connect-button label="Web Serial Connect" (connect)="onConnect()" />
  </div>
}
